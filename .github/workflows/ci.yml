name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore RibbonKit.sln

      - name: Build
        run: dotnet build RibbonKit.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test RibbonKit.sln --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack src/RibbonKit/RibbonKit.csproj --no-build --configuration Release --output artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
